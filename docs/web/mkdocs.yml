site_name: brilliant-CV
site_url: https://yunanwg.github.io/brilliant-CV/
site_description: A modern, modular CV template for Typst
repo_url: https://github.com/yunanwg/brilliant-CV
repo_name: brilliant-CV

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate     # inline (1) annotations on code blocks
    - content.tabs.link         # synced tab selection across pages
    - navigation.instant        # no full reload between pages
    - navigation.tabs           # top-level grouping rendered as tabs
    - navigation.tabs.sticky    # tab bar stays visible while scrolling
    - navigation.sections       # group heads render as section headings
    - navigation.top            # back-to-top button on long pages
    - navigation.tracking       # URL updates with the current section
    - toc.integrate

plugins:
  - search
  - glightbox:                 # click-to-zoom on screenshots / gallery
      width: 90%
      height: auto

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: getting-started.md
      - Components: components.md
      - Recipes: recipes.md
  - Reference:
      - Configuration: configuration.md
      - API Reference: api-reference.md
  - Migration & FAQ:
      - Migration Guide: migration.md
      - Troubleshooting: troubleshooting.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      # Resolve snippet includes against the repo root, so the docs can
      # live-include canonical source files (template/profile_en/metadata.toml,
      # etc.) without copying / risking drift.
      base_path:
        - ../..
      check_paths: true
  - pymdownx.emoji:
      # Enables Material's icon shortcodes (`:material-rocket:`, etc.)
      # used by the cards grid on the landing page.
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html        # required by `<div class="grid cards" markdown>`
  - toc:
      permalink: true
