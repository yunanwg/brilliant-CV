repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    - id: end-of-file-fixer
    - id: trailing-whitespace
  - repo: https://github.com/typstyle-rs/typstyle
    rev: 'v0.14.4'
    hooks:
      - id: typstyle
  - repo: local
    hooks:
      - id: delete-all-pdfs
        name: Delete all PDFs
        entry: bash -c 'find . -type f -name "*.pdf" -delete'
        language: system
        types: [file]
        files: \.pdf$
      - id: check-version-consistency
        name: Check version consistency
        entry: bash -c 'just check-version'
        language: system
        pass_filenames: false
        files: \.(typ|toml)$
