#:schema https://raw.githubusercontent.com/yunanwg/brilliant-CV/main/metadata.toml.schema.json

# Profile: Chinese. See profile_en/metadata.toml for inline documentation
# of every field.
language = "zh"
header_quote = "具有丰富经验的数据分析师，随时可入职"
cv_footer = "简历"
letter_footer = "申请信"

# Non-Latin script settings: name in CJK script + matching font.
# When `language` is one of (zh, ja, ko, ru) the package uses these instead
# of the Latin first/last name and adds the font to the fallback chain.
non_latin_name = "王道尔"
non_latin_font = "Heiti SC"

[layout]
    awesome_color = "skyblue"
    before_section_skip = "1pt"
    before_entry_skip = "1pt"
    before_entry_description_skip = "1pt"
    paper_size = "a4"

    [layout.fonts]
        regular_fonts = ["Source Sans 3"]
        header_font = "Roboto"

    [layout.header]
        header_align = "left"
        display_profile_photo = true
        profile_photo_radius = "50%"
        info_font_size = "10pt"

    [layout.entry]
        display_entry_society_first = true
        display_logo = true

    [layout.footer]
        display_page_counter = false
        display_footer = true


[inject]
    injected_keywords_list = ["数据分析师", "GCP", "Python", "SQL", "Tableau"]

[personal]
    first_name = "John"
    last_name = "Doe"

    [personal.info]
        github = "yunanwg"
        phone = "+86 138 0000 0000"
        email = "john.doe@me.org"
        linkedin = "johndoe"
        gitlab = "yunanwg"
        homepage = "johndoe.dev"
        orcid = "0000-0000-0000-0000"
        location = "上海"

        [personal.info.custom-degree]
            awesomeIcon = "graduation-cap"
            text = "数据科学博士"
            link = "https://www.example.com"

        [personal.info.custom-cert]
            awesomeIcon = "certificate"
            text = "AWS Certified"
            link = "https://aws.amazon.com/certification/"
