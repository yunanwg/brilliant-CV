# Profile: Chinese
language = "zh"
header_quote = "具有丰富经验的数据分析师，随时可入职"
cv_footer = "简历"
letter_footer = "申请信"

# Non-Latin script settings
non_latin_name = "王道尔"
non_latin_font = "Heiti SC"

[layout]
    awesome_color = "skyblue"
    before_section_skip = "1pt"
    before_entry_skip = "1pt"
    before_entry_description_skip = "1pt"
    paper_size = "a4"

    [layout.fonts]
        regular_fonts = ["Source Sans 3"]
        header_font = "Roboto"

    [layout.header]
        header_align = "left"
        display_profile_photo = true
        profile_photo_radius = "50%"
        info_font_size = "10pt"

    [layout.entry]
        display_entry_society_first = true
        display_logo = true

    [layout.footer]
        display_page_counter = false
        display_footer = true

[inject]
    inject_ai_prompt = false
    inject_keywords = true
    injected_keywords_list = ["Data Analyst", "GCP", "Python", "SQL", "Tableau"]

