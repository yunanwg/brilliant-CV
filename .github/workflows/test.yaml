name: Test
permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI runs the test suite inside the same Docker image used locally
# (tests/Dockerfile). One source of truth for typst / tytanic / typstyle
# versions and font installation. Persistent refs additionally select fonts
# verified stable across the maintainer's Apple Silicon Mac and CI Linux.
#
# Architecture: arm64 native on both sides. Cross-arch (x86 image via
# Rosetta on Apple Silicon, or vice versa) drifts FreeType pixels;
# see tests/Dockerfile header for the rationale.

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Buildx (for layer cache)
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: tests/Dockerfile
          tags: brilliant-cv-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Guards need only bash + python3 stdlib, so they run on the runner
      # host — the test image deliberately doesn't ship python3.
      - name: Machine guards (determinism + profile parity)
        run: bash tests/guards.sh

      - name: Run tytanic + panic suite
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            brilliant-cv-test \
            bash -c "tt run --no-fail-fast && bash tests/panics/run.sh"

      - name: Format check (typstyle)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            brilliant-cv-test \
            typstyle --check src template tests

      - name: Upload diff PNGs on test failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tytanic-diffs
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
