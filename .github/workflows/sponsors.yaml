name: Update Sponsors

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sponsors:
    name: Update Sponsors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # Default GITHUB_TOKEN is enough for checkout/push (permissions:
        # contents: write above); no need for the cross-repo PAT here.

      - name: Generate Sponsors
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          # PAT_TOKEN is required here specifically: the Sponsors GraphQL
          # API can't be read with the default GITHUB_TOKEN. Recommend
          # scoping this to a fine-grained PAT with read-only sponsorship
          # access rather than a broad classic PAT.
          token: ${{ secrets.PAT_TOKEN }}
          file: 'README.md'
          marker: 'sponsors'
          template: '<a href="https://github.com/{{{ login }}}"><img src="https://github.com/{{{ login }}}.png" width="60px" alt="{{{ login }}}" style="border-radius: 50%;" /></a>&nbsp;&nbsp;'
          active-only: false
          include-private: true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "docs: update sponsors"
            git push
          fi
