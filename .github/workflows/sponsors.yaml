name: Update Sponsors

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-sponsors
  cancel-in-progress: false

jobs:
  sponsors:
    name: Update Sponsors
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          persist-credentials: false

      - name: Generate sponsors with read-only credential
        uses: JamesIves/github-sponsors-readme-action@2fd9142e765f755780202122261dc85e78459405 # v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: README.md
          marker: sponsors
          template: '<a href="https://github.com/{{{ login }}}"><img src="https://github.com/{{{ login }}}.png" width="60px" alt="{{{ login }}}" style="border-radius: 50%;" /></a>&nbsp;&nbsp;'
          active-only: false
          include-private: true

      - name: Commit to automation branch and open or reuse PR
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PR_TOKEN }}
          BRANCH_NAME: automation/update-sponsors
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "AUTOMATION_PR_TOKEN is required."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git add README.md
          if git diff --cached --quiet; then
            echo "Sponsor list is already current."
            exit 0
          fi

          git switch --create "$BRANCH_NAME"
          git commit -m "docs: update sponsors"
          REMOTE_SHA=$(git ls-remote --heads origin "refs/heads/$BRANCH_NAME" | awk '{print $1}')
          if [ -n "$REMOTE_SHA" ]; then
            git push origin "HEAD:refs/heads/$BRANCH_NAME" \
              --force-with-lease="refs/heads/$BRANCH_NAME:$REMOTE_SHA"
          else
            git push origin "HEAD:refs/heads/$BRANCH_NAME"
          fi

          PR_URL=$(gh pr list --head "$BRANCH_NAME" --state open \
            --json url --jq '.[0].url // ""')
          if [ -n "$PR_URL" ]; then
            echo "Updated existing sponsor PR: $PR_URL"
          else
            gh pr create --base main --head "$BRANCH_NAME" \
              --title "docs: update sponsors" \
              --body "Automated weekly refresh of the README sponsor list."
          fi
