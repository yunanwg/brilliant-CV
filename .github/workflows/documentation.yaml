name: Deploy Documentation

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      # Generate the API reference from typst doc-comments.
      # configuration.md is no longer generated — it live-includes
      # template/profile_en/metadata.toml via pymdownx.snippets.
      - run: uv run --no-project docs/web/generate-api-reference.py

      # Build MkDocs site
      - run: uv tool install mkdocs --with mkdocs-material --with mkdocs-glightbox
      - run: cd docs/web && mkdocs build --strict --site-dir ../../public

      # Deploy to GitHub Pages
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
