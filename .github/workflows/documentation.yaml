name: Deploy Documentation

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Generate API reference from source doc-comments
      - run: python docs/web/generate-api-reference.py

      # Build MkDocs site
      - uses: astral-sh/setup-uv@v4
      - run: uv tool install mkdocs-material
      - run: cd docs/web && mkdocs build --strict --site-dir ../../public

      # Deploy to GitHub Pages
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
