name: Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5
        with:
          typst-version: 0.14.0

      - name: Validate shipped metadata schema
        run: uv run --with-requirements scripts/requirements-checks.lock python scripts/check_metadata_schema.py

      - name: Generate and validate public documentation
        run: |
          python3 docs/web/generate-api-reference.py
          git diff --exit-code -- docs/web/docs/api-reference.md
          python3 scripts/check_docs_snippets.py

      - name: Copy component render refs
        run: |
          mkdir -p docs/web/docs/assets/components
          for dir in tests/components/*/; do
            name=$(basename "$dir")
            cp "$dir/ref/1.png" "docs/web/docs/assets/components/$name.png"
          done

      - name: Build strict MkDocs site from lockfile
        run: cd docs/web && uv run --with-requirements requirements.lock mkdocs build --strict --site-dir ../../public

      - name: Upload documentation site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-site
          path: public/
          if-no-files-found: error
          retention-days: 1

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: documentation-site
          path: public

      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
