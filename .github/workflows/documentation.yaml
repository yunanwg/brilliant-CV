name: Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.14.0

      - name: Validate shipped metadata schema
        run: uv run --with jsonschema==4.25.1 python scripts/check_metadata_schema.py

      # Generate the API reference from typst doc-comments.
      # configuration.md is no longer generated — it live-includes
      # template/profile_en/metadata.toml via pymdownx.snippets.
      - run: uv run --no-project docs/web/generate-api-reference.py
      - name: Check generated API reference and compile its examples
        run: |
          git diff --exit-code -- docs/web/docs/api-reference.md
          python3 scripts/check_docs_snippets.py

      # Copy component render refs from tests/components/ so components.md
      # can show "what does this look like" panels beside each example.
      # Mirrors the `just docs-generate` recipe used locally.
      - name: Copy component render refs
        run: |
          mkdir -p docs/web/docs/assets/components
          for dir in tests/components/*/; do
            name=$(basename "$dir")
            cp "$dir/ref/1.png" "docs/web/docs/assets/components/$name.png"
          done

      # Build MkDocs site
      - run: uv tool install mkdocs --with mkdocs-material --with mkdocs-glightbox
      - run: cd docs/web && mkdocs build --strict --site-dir ../../public

      # Deploy to GitHub Pages (push to main only — PRs build for
      # validation but never deploy)
      - uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
