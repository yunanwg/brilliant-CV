# Regenerate the README gallery preview PNGs (docs/previews/) on the native
# arm64 runner, inside the pinned test Docker image so CJK renders with Noto
# Sans CJK SC and the fonts match the CI baseline.
#
# Manual tool (workflow_dispatch): run it on a branch after a template or
# metadata change that alters the rendered CV; it renders cv-<profile>.png for
# the showcased profiles and pushes them back to the dispatched branch. Review
# the image diff before merging — same rule as regenerating visual refs.
name: Update preview images

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  previews:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Require a feature branch
        run: |
          if [[ "$GITHUB_REF" != refs/heads/* || "$GITHUB_REF_NAME" == "main" ]]; then
            echo "Dispatch this workflow from a feature branch, never main or a tag."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Buildx (for layer cache)
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: tests/Dockerfile
          tags: brilliant-cv-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render preview images
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            brilliant-cv-test \
            bash scripts/render_previews.sh docs/previews

      - name: Commit and push preview images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/previews; then
            echo "Preview images already up to date; nothing to commit."
            exit 0
          fi
          git add docs/previews
          git commit -m "docs(readme): regenerate preview images"
          git push origin "HEAD:${GITHUB_REF_NAME}"
