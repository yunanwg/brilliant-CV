[package]
name = "brilliant-cv"
version = "4.0.0"
entrypoint = "src/lib.typ"
authors = ["Yunan Wang <https://github.com/yunanwg>"]
license = "Apache-2.0"
description = "💼 another CV template for your job application, yet powered by Typst and more"
repository = "https://github.com/yunanwg/brilliant-CV"
keywords = [
    "cv",
    "resume",
    "cover-letter",
    "curriculum-vitae",
    "modular",
    "multilingual",
    "ai-injection",
]
categories = ["cv", "languages", "layout"]
compiler = "0.14.0"
exclude = [
    "docs",
    "tests",
    "justfile",
    ".github",
    ".pre-commit-config.yaml",
    ".gitignore",
]

[template]
path = "template"
entrypoint = "cv.typ"
thumbnail = "thumbnail.png"

[tool.utpm]
namespace = "preview"

[tool.tytanic]
# Per-channel pixel delta budget (0-255). Set high enough to absorb the
# antialiasing differences between maintainer macOS (CoreText / freetype-on-
# macos) and CI Linux freetype/harfbuzz, which on full-page text-heavy refs
# produce rim-of-glyph differences in the 30-50 range per channel.
default.max-delta = 50
# Total pixels per ref image allowed to deviate beyond max-delta. A4 page
# at 144 dpi is ~1.4 megapixels; 50000 ≈ 3.5% tolerance — loose enough that
# cross-OS rendering noise passes, tight enough that any real layout change
# (which displaces whole glyph runs, not edges) is caught. Tighten if
# regressions slip through; the per-test annotation `/// [max-deviations]`
# can override a single test if needed.
default.max-deviations = 50000
