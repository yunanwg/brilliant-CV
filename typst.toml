[package]
name = "brilliant-cv"
version = "4.0.0"
entrypoint = "src/lib.typ"
authors = ["Yunan Wang <https://github.com/yunanwg>"]
license = "Apache-2.0"
description = "💼 another CV template for your job application, yet powered by Typst and more"
repository = "https://github.com/yunanwg/brilliant-CV"
keywords = [
    "cv",
    "resume",
    "cover-letter",
    "curriculum-vitae",
    "modular",
    "multilingual",
    "ai-injection",
]
categories = ["cv", "languages", "layout"]
compiler = "0.14.0"
exclude = ["docs", ".pre-commit-config.yaml", ".gitignore"]

[template]
path = "template"
entrypoint = "cv.typ"
thumbnail = "thumbnail.png"

[tool.utpm]
namespace = "preview"

[tool.tytanic]
# Per-channel pixel delta budget (0-255). Loose enough to absorb subpixel
# rendering jitter between maintainer macOS and CI Linux freetype/harfbuzz
# versions; tighten if regressions slip through.
default.max-delta = 10
# Total pixels per ref image allowed to deviate beyond max-delta. A4 page
# at 144 dpi is ~1.4 megapixels, so 2000 ≈ 0.14% tolerance.
default.max-deviations = 2000
